<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AgriTech AI{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    {% block styles %}{% endblock %}
</head>
<body>

    {% block content %}{% endblock %}

    <!-- Chart.js for Data Visualization (used on dashboard) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    {% block scripts %}{% endblock %}

    <!-- ================================================================== -->
    <!-- PREMIUM FEATURE: AI CHATBOT WIDGET                                 -->
    <!-- The HTML, CSS, and JS are all placed here in base.html so the      -->
    <!-- chatbot is available on any page that extends this template.       -->
    <!-- ================================================================== -->

    <!-- 1. Chatbot CSS -->
    <style>
        .chat-widget-container {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 1050; /* High z-index to be on top of everything */
        }

        .chat-toggle-button {
            width: 60px;
            height: 60px;
            background-color: var(--primary-green);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        .chat-toggle-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .chat-window {
            position: absolute;
            bottom: 80px; /* Position above the toggle button */
            right: 0;
            width: 350px;
            height: 450px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Start hidden and scale down */
            transform: scale(0);
            transform-origin: bottom right;
            opacity: 0;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        .chat-window.open {
            transform: scale(1);
            opacity: 1;
        }

        .chat-header {
            background: var(--dark-green);
            color: white;
            padding: 15px;
            font-weight: bold;
            text-align: center;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chat-message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
        }
        .chat-message.user {
            background-color: #e9e9eb;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .chat-message.bot {
            background-color: #f0f2f5;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .chat-message.typing {
            color: #888;
            font-style: italic;
        }

        .chat-input-form {
            display: flex;
            border-top: 1px solid #eee;
            padding: 10px;
        }
        .chat-input-form input {
            flex-grow: 1;
            border: none;
            outline: none;
            padding: 10px;
        }
        .chat-input-form button {
            background: none;
            border: none;
            color: var(--primary-green);
            font-size: 20px;
            cursor: pointer;
        }
    </style>

    <!-- 2. Chatbot HTML -->
    <div class="chat-widget-container">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">AgriBot Assistant</div>
            <div class="chat-messages" id="chat-messages">
                <div class="chat-message bot">Hello! How can I help you with your farm today?</div>
            </div>
            <form class="chat-input-form" id="chat-form">
                <input type="text" id="chat-input" placeholder="Ask a question..." autocomplete="off" required>
                <button type="submit"><i class="fas fa-paper-plane"></i></button>
            </form>
        </div>
        <div class="chat-toggle-button" id="chat-toggle-button">
            <i class="fas fa-comments"></i>
        </div>
    </div>

    <!-- 3. Chatbot JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const chatWindow = document.getElementById('chat-window');
            const toggleButton = document.getElementById('chat-toggle-button');
            const chatForm = document.getElementById('chat-form');
            const chatInput = document.getElementById('chat-input');
            const messagesContainer = document.getElementById('chat-messages');

            // --- Event Listeners ---

            // Toggle the chat window open/closed
            toggleButton.addEventListener('click', () => {
                chatWindow.classList.toggle('open');
            });

            // Handle form submission (sending a message)
            chatForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const message = chatInput.value.trim();
                if (!message) return;

                // Display user's message
                addMessage(message, 'user');
                chatInput.value = '';

                // Show a "typing" indicator
                addMessage('AgriBot is typing...', 'bot typing');

                try {
                    // Send message to the Flask backend
                    const response = await fetch('/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: message })
                    });

                    if (!response.ok) {
                        throw new Error(`Server error: ${response.status}`);
                    }

                    const data = await response.json();

                    // Remove "typing" indicator
                    document.querySelector('.chat-message.typing').remove();

                    // Display bot's reply
                    addMessage(data.reply, 'bot');

                } catch (error) {
                    console.error('Chat Error:', error);
                    document.querySelector('.chat-message.typing').remove();
                    addMessage('Sorry, I am having trouble connecting. Please try again later.', 'bot');
                }
            });

            // --- Helper Functions ---

            /**
             * Adds a new message bubble to the chat window.
             * @param {string} text - The message content.
             * @param {string} type - The sender type ('user', 'bot', 'bot typing').
             */
            function addMessage(text, type) {
                const messageElement = document.createElement('div');
                messageElement.className = `chat-message ${type}`;
                messageElement.textContent = text;
                messagesContainer.appendChild(messageElement);

                // Scroll to the bottom to see the new message
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }
        });
    </script>
</body>
</html>
