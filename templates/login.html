<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #2c3e50; 
            display: flex; justify-content: center; align-items: center; height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            background: white; padding: 40px; border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); width: 100%; max-width: 400px; 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3 class="text-center text-success mb-4">🌱 Smart Farm Login</h3>
        
        {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fs-5">Secure Login</button>
        </form>
        <div class="text-center mt-3 text-muted" style="font-size: 0.85rem;">
            Demo Credentials: username: <b>farmer</b> | password: <b>farm123</b>
        </div>
    </div>

</body>
</html>
